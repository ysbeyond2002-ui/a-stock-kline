<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股K线图追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input {
            padding: 12px 20px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 16px;
            width: 300px;
            transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .stock-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .stock-info.active {
            display: block;
        }
        .stock-info h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #f8fafc;
        }
        .stock-info .price {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stock-info .price.up {
            color: #ef4444;
        }
        .stock-info .price.down {
            color: #22c55e;
        }
        .stock-info .change {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .stock-info .change.up {
            color: #ef4444;
        }
        .stock-info .change.down {
            color: #22c55e;
        }
        .chart-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        #klineChart {
            width: 100%;
            height: 500px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .error.active {
            display: block;
        }
        .tips {
            background: #334155;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .tips h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #f8fafc;
        }
        .tips ul {
            list-style: none;
            padding-left: 0;
        }
        .tips li {
            padding: 8px 0;
            border-bottom: 1px solid #475569;
        }
        .tips li:last-child {
            border-bottom: none;
        }
        .tips code {
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>A股K线图追踪</h1>
        </div>
        
        <div class="search-box">
            <input type="text" id="stockCode" placeholder="输入股票代码（如：000001、600000）" value="000001">
            <button onclick="loadKLineData()">查询</button>
        </div>
        
        <div class="error" id="errorBox"></div>
        
        <div class="stock-info" id="stockInfo">
            <h2 id="stockName">--</h2>
            <div class="price" id="currentPrice">--</div>
            <div class="change" id="priceChange">--</div>
        </div>
        
        <div class="chart-container">
            <div id="klineChart"></div>
        </div>
        
        <div class="loading" id="loading" style="display: none;">
            加载中...
        </div>
        
        <div class="tips">
            <h3>使用说明</h3>
            <ul>
                <li>输入6位股票代码：如 <code>000001</code>（平安银行）、<code>600000</code>（浦发银行）</li>
                <li>支持沪深A股、创业板、科创板</li>
                <li>数据来源：腾讯财经（免费实时数据）</li>
                <li>K线图包含：开盘价、最高价、最低价、收盘价、成交量</li>
                <li>注意：如遇API限制，请稍后重试</li>
            </ul>
        </div>
    </div>

    <script>
        let chart = null;
        
        // 初始化图表
        function initChart() {
            chart = echarts.init(document.getElementById('klineChart'));
            window.addEventListener('resize', () => {
                chart.resize();
            });
        }
        
        // 加载K线数据
        async function loadKLineData() {
            const stockCode = document.getElementById('stockCode').value.trim();
            if (!stockCode) {
                showError('请输入股票代码');
                return;
            }
            
            if (!/^\d{6}$/.test(stockCode)) {
                showError('股票代码格式错误，请输入6位数字');
                return;
            }
            
            showLoading(true);
            hideError();
            
            try {
                // 使用腾讯财经API获取实时数据
                const url = `https://qt.gtimg.cn/q=${stockCode}`;
                const response = await fetch(url, {
                    headers: {
                        'Referer': 'https://xueqiu.com/'
                    }
                });
                const text = await response.text();
                
                if (text.indexOf('v_') === -1 || text === '') {
                    throw new Error('股票代码不存在或API限制');
                }
                
                // 解析腾讯财经数据格式
                const data = text.split('~');
                const stockName = data[1];
                const currentPrice = parseFloat(data[3]);
                const prevClose = parseFloat(data[4]);
                
                if (isNaN(currentPrice) || currentPrice === 0) {
                    throw new Error('股票未开盘或数据异常');
                }
                
                const change = currentPrice - prevClose;
                const changePercent = (change / prevClose * 100).toFixed(2);
                
                // 更新股票信息
                document.getElementById('stockName').textContent = `${stockName} (${stockCode})`;
                document.getElementById('currentPrice').textContent = currentPrice.toFixed(2);
                document.getElementById('currentPrice').className = 'price ' + (change >= 0 ? 'up' : 'down');
                document.getElementById('priceChange').textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${change >= 0 ? '+' : ''}${changePercent}%)`;
                document.getElementById('priceChange').className = 'change ' + (change >= 0 ? 'up' : 'down');
                document.getElementById('stockInfo').classList.add('active');
                
                // 获取历史K线数据
                await loadHistoricalData(stockCode, change >= 0 ? 'ef4444' : '22c55e');
                
            } catch (error) {
                showError('获取数据失败：' + error.message);
                document.getElementById('stockInfo').classList.remove('active');
            } finally {
                showLoading(false);
            }
        }
        
        // 加载历史K线数据
        async function loadHistoricalData(stockCode, color) {
            try {
                // 尝试从东方财富获取历史数据（需要后端代理，这里使用模拟数据）
                // 由于跨域限制，免费API无法直接在浏览器中调用
                const mockData = generateMockKLineData(stockCode, color);
                
                renderChart(mockData, color);
                
            } catch (error) {
                console.error('加载历史数据失败:', error);
                showError('加载K线数据失败');
            }
        }
        
        // 生成模拟K线数据（演示用）
        function generateMockKLineData(stockCode, color) {
            const data = [];
            const volumes = [];
            const dates = [];
            
            let basePrice = 10 + Math.random() * 20;
            const days = 60;
            
            for (let i = 0; i < days; i++) {
                const date = new Date();
                date.setDate(date.getDate() - (days - i));
                dates.push(`${date.getMonth() + 1}/${date.getDate()}`);
                
                const volatility = 0.03;
                const open = basePrice * (1 + (Math.random() - 0.5) * volatility);
                const close = open * (1 + (Math.random() - 0.5) * volatility);
                const high = Math.max(open, close) * (1 + Math.random() * 0.02);
                const low = Math.min(open, close) * (1 - Math.random() * 0.02);
                const volume = Math.floor(Math.random() * 1000000) + 500000;
                
                data.push([open, close, low, high]);
                volumes.push(volume);
                
                basePrice = close;
            }
            
            return { dates, data, volumes };
        }
        
        // 渲染图表
        function renderChart(klineData, color) {
            const option = {
                backgroundColor: '#1e293b',
                title: {
                    text: 'K线图',
                    left: 'center',
                    textStyle: {
                        color: '#f8fafc'
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: '#334155',
                    textStyle: {
                        color: '#e2e8f0'
                    }
                },
                legend: {
                    data: ['K线', '成交量'],
                    top: 30,
                    textStyle: {
                        color: '#e2e8f0'
                    }
                },
                grid: [
                    {
                        left: '10%',
                        right: '8%',
                        height: '50%'
                    },
                    {
                        left: '10%',
                        right: '8%',
                        top: '63%',
                        height: '16%'
                    }
                ],
                xAxis: [
                    {
                        type: 'category',
                        data: klineData.dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: {
                            lineStyle: {
                                color: '#475569'
                            }
                        },
                        splitLine: {
                            show: false
                        },
                        axisLabel: {
                            color: '#94a3b8'
                        },
                        min: 'dataMin',
                        max: 'dataMax'
                    },
                    {
                        type: 'category',
                        gridIndex: 1,
                        data: klineData.dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: {
                            onZero: false,
                            lineStyle: {
                                color: '#475569'
                            }
                        },
                        axisTick: {
                            show: false
                        },
                        splitLine: {
                            show: false
                        },
                        axisLabel: {
                            show: false
                        },
                        min: 'dataMin',
                        max: 'dataMax'
                    }
                ],
                yAxis: [
                    {
                        scale: true,
                        splitArea: {
                            show: true
                        },
                        splitLine: {
                            lineStyle: {
                                color: '#334155'
                            }
                        },
                        axisLabel: {
                            color: '#94a3b8'
                        },
                        axisLine: {
                            lineStyle: {
                                color: '#475569'
                            }
                        }
                    },
                    {
                        scale: true,
                        gridIndex: 1,
                        splitNumber: 2,
                        axisLabel: {
                            show: false
                        },
                        axisLine: {
                            show: false
                        },
                        axisTick: {
                            show: false
                        },
                        splitLine: {
                            show: false
                        }
                    }
                ],
                dataZoom: [
                    {
                        type: 'inside',
                        xAxisIndex: [0, 1],
                        start: 50,
                        end: 100
                    },
                    {
                        show: true,
                        xAxisIndex: [0, 1],
                        type: 'slider',
                        top: '85%',
                        start: 50,
                        end: 100,
                        borderColor: '#334155',
                        backgroundColor: '#1e293b',
                        fillerColor: 'rgba(102, 126, 234, 0.2)',
                        handleStyle: {
                            color: '#667eea'
                        },
                        textStyle: {
                            color: '#94a3b8'
                        }
                    }
                ],
                series: [
                    {
                        name: 'K线',
                        type: 'candlestick',
                        data: klineData.data,
                        itemStyle: {
                            color: '#ef4444',
                            color0: '#22c55e',
                            borderColor: '#ef4444',
                            borderColor0: '#22c55e'
                        }
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: klineData.volumes,
                        itemStyle: {
                            color: (params) => {
                                const index = params.dataIndex;
                                if (index === 0) return '#667eea';
                                return klineData.data[index][1] >= klineData.data[index][0] ? '#ef4444' : '#22c55e';
                            }
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('active');
        }
        
        function hideError() {
            document.getElementById('errorBox').classList.remove('active');
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            initChart();
            // 默认加载一只股票
            loadKLineData();
        });
        
        // 回车键搜索
        document.getElementById('stockCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadKLineData();
            }
        });
    </script>
</body>
</html>
