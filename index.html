<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股 K 线图追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input {
            padding: 12px 20px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 16px;
            width: 300px;
            transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .stock-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .stock-info.active {
            display: block;
        }
        .stock-info h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #f8fafc;
        }
        .stock-info .price {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stock-info .price.up {
            color: #ef4444;
        }
        .stock-info .price.down {
            color: #22c55e;
        }
        .stock-info .change {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .stock-info .change.up {
            color: #ef4444;
        }
        .stock-info .change.down {
            color: #22c55e;
        }
        .chart-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        #klineChart {
            width: 100%;
            height: 500px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .error.active {
            display: block;
        }
        .tips {
            background: #334155;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .tips h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #f8fafc;
        }
        .tips ul {
            list-style: none;
            padding-left: 0;
        }
        .tips li {
            padding: 8px 0;
            border-bottom: 1px solid #475569;
        }
        .tips li:last-child {
            border-bottom: none;
        }
        .tips code {
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #a5b4fc;
        }
        .demo-notice {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .demo-notice p {
            color: white;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>A 股 K 线图追踪</h1>
        </div>
        
        <div class="demo-notice">
            <p>🎯 演示版本 - 使用模拟数据展示 K 线图效果，无需 API 即可运行</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="stockCode" placeholder="输入股票代码（如：000001、600000）" value="000001">
            <button onclick="loadKLineData()">查询</button>
        </div>
        
        <div class="error" id="errorBox"></div>
        
        <div class="stock-info" id="stockInfo">
            <h2 id="stockName">--</h2>
            <div class="price" id="currentPrice">--</div>
            <div class="change" id="priceChange">--</div>
        </div>
        
        <div class="chart-container">
            <div id="klineChart"></div>
        </div>
        
        <div class="loading" id="loading" style="display: none;">
            加载中...
        </div>
        
        <div class="tips">
            <h3>使用说明</h3>
            <ul>
                <li>输入 6 位股票代码：如 <code>000001</code>（平安银行）、<code>600000</code>（浦发银行）</li>
                <li>支持沪深 A 股、创业板、科创板</li>
                <li>当前为演示版本，使用模拟数据</li>
                <li>K 线图包含：开盘价、最高价、最低价、收盘价、成交量</li>
                <li>红涨绿跌显示</li>
            </ul>
        </div>
    </div>

    <script>
        let chart = null;
        
        // 初始化图表
        function initChart() {
            chart = echarts.init(document.getElementById('klineChart'));
            window.addEventListener('resize', () => {
                chart.resize();
            });
        }
        
        // 模拟股票数据
        function getMockStockData(stockCode) {
            const stockNames = {
                '000001': '平安银行',
                '000002': '万科 A',
                '600000': '浦发银行',
                '600036': '招商银行',
                '601318': '中国平安'
            };
            
            const basePrice = 10 + Math.random() * 50;
            const changePercent = (Math.random() - 0.5) * 10;
            const change = basePrice * changePercent / 100;
            
            return {
                name: stockNames[stockCode] || '演示股票',
                price: basePrice,
                change: change,
                changePercent: changePercent.toFixed(2)
            };
        }
        
        // 加载 K 线数据
        async function loadKLineData() {
            const stockCode = document.getElementById('stockCode').value.trim();
            if (!stockCode) {
                showError('请输入股票代码');
                return;
            }
            
            if (!/^\d{6}$/.test(stockCode)) {
                showError('股票代码格式错误，请输入 6 位数字');
                return;
            }
            
            showLoading(true);
            hideError();
            
            try {
                // 使用模拟数据
                const mockStockData = getMockStockData(stockCode);
                
                // 更新股票信息
                document.getElementById('stockName').textContent = `${mockStockData.name} (${stockCode})`;
                document.getElementById('currentPrice').textContent = mockStockData.price.toFixed(2);
                document.getElementById('currentPrice').className = 'price ' + (mockStockData.change >= 0 ? 'up' : 'down');
                document.getElementById('priceChange').textContent = `${mockStockData.change >= 0 ? '+' : ''}${mockStockData.change.toFixed(2)} (${mockStockData.change >= 0 ? '+' : ''}${mockStockData.changePercent}%)`;
                document.getElementById('priceChange').className = 'change ' + (mockStockData.change >= 0 ? 'up' : 'down');
                document.getElementById('stockInfo').classList.add('active');
                
                // 生成并渲染 K 线数据
                const klineData = generateMockKLineData(stockCode, mockStockData.change >= 0 ? 'ef4444' : '22c55e');
                renderChart(klineData);
                
            } catch (error) {
                showError('获取数据失败：' + error.message);
                document.getElementById('stockInfo').classList.remove('active');
            } finally {
                showLoading(false);
            }
        }
        
        // 生成模拟 K 线数据
        function generateMockKLineData(stockCode) {
            const data = [];
            const volumes = [];
            const dates = [];
            
            let basePrice = 10 + Math.random() * 20;
            const days = 60;
            
            for (let i = 0; i < days; i++) {
                const date = new Date();
                date.setDate(date.getDate() - (days - i));
                dates.push(`${date.getMonth() + 1}/${date.getDate()}`);
                
                const volatility = 0.03;
                const open = basePrice * (1 + (Math.random() - 0.5) * volatility);
                const close = open * (1 + (Math.random() - 0.5) * volatility);
                const high = Math.max(open, close) * (1 + Math.random() * 0.02);
                const low = Math.min(open, close) * (1 - Math.random() * 0.02);
                const volume = Math.floor(Math.random() * 1000000) + 500000;
                
                data.push([open.toFixed(2), close.toFixed(2), low.toFixed(2), high.toFixed(2)]);
                volumes.push(volume);
                
                basePrice = close;
            }
            
            return { dates, data, volumes };
        }
        
        // 渲染图表
        function renderChart(klineData) {
            const option = {
                backgroundColor: '#1e293b',
                title: {
                    text: 'K 线图（60 日）',
                    left: 'center',
                    textStyle: {
                        color: '#f8fafc'
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    borderColor: '#334155',
                    textStyle: {
                        color: '#e2e8f0'
                    }
                },
                legend: {
                    data: ['K 线', '成交量'],
                    top: 30,
                    textStyle: {
                        color: '#e2e8f0'
                    }
                },
                grid: [
                    {
                        left: '10%',
                        right: '8%',
                        height: '50%'
                    },
                    {
                        left: '10%',
                        right: '8%',
                        top: '63%',
                        height: '16%'
                    }
                ],
                xAxis: [
                    {
                        type: 'category',
                        data: klineData.dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: {
                            lineStyle: {
                                color: '#475569'
                            }
                        },
                        splitLine: {
                            show: false
                        },
                        axisLabel: {
                            color: '#94a3b8'
                        },
                        min: 'dataMin',
                        max: 'dataMax'
                    },
                    {
                        type: 'category',
                        gridIndex: 1,
                        data: klineData.dates,
                        scale: true,
                        boundaryGap: false,
                        axisLine: {
                            onZero: false,
                            lineStyle: {
                                color: '#475569'
                            }
                        },
                        axisTick: {
                            show: false
                        },
                        splitLine: {
                            show: false
                        },
                        axisLabel: {
                            show: false
                        },
                        min: 'dataMin',
                        max: 'dataMax'
                    }
                ],
                yAxis: [
                    {
                        scale: true,
                        splitArea: {
                            show: true
                        },
                        splitLine: {
                            lineStyle: {
                                color: '#334155'
                            }
                        },
                        axisLabel: {
                            color: '#94a3b8'
                        },
                        axisLine: {
                            lineStyle: {
                                color: '#475569'
                            }
                        }
                    },
                    {
                        scale: true,
                        gridIndex: 1,
                        splitNumber: 2,
                        axisLabel: {
                            show: false
                        },
                        axisLine: {
                            show: false
                        },
                        axisTick: {
                            show: false
                        },
                        splitLine: {
                            show: false
                        }
                    }
                ],
                dataZoom: [
                    {
                        type: 'inside',
                        xAxisIndex: [0, 1],
                        start: 50,
                        end: 100
                    },
                    {
                        show: true,
                        xAxisIndex: [0, 1],
                        type: 'slider',
                        top: '85%',
                        start: 50,
                        end: 100,
                        borderColor: '#334155',
                        backgroundColor: '#1e293b',
                        fillerColor: 'rgba(102, 126, 234, 0.2)',
                        handleStyle: {
                            color: '#667eea'
                        },
                        textStyle: {
                            color: '#94a3b8'
                        }
                    }
                ],
                series: [
                    {
                        name: 'K 线',
                        type: 'candlestick',
                        data: klineData.data,
                        itemStyle: {
                            color: '#ef4444',
                            color0: '#22c55e',
                            borderColor: '#ef4444',
                            borderColor0: '#22c55e'
                        }
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: klineData.volumes,
                        itemStyle: {
                            color: (params) => {
                                const index = params.dataIndex;
                                if (index === 0) return '#667eea';
                                return klineData.data[index][1] >= klineData.data[index][0] ? '#ef4444' : '#22c55e';
                            }
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('active');
        }
        
        function hideError() {
            document.getElementById('errorBox').classList.remove('active');
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            initChart();
            // 默认加载一只股票
            loadKLineData();
        });
        
        // 回车键搜索
        document.getElementById('stockCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadKLineData();
            }
        });
    </script>
</body>
</html>
